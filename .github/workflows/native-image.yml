name: GraalVM Build and Release

on:
  workflow_dispatch:

jobs:
  build:
    name: transcli on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          version: '25.1'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build transcli
        run: |
          ./gradlew nativeCompile
          ./build/native/nativeCompile/transcli -h

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: transcli-${{ matrix.os }}-${{ runner.arch }}
          path: |
            ./build/native/nativeCompile/transcli
          if-no-files-found: error